- id: terrarium_lampen_auto_zeiten
  alias: Terrarium Lampen Auto Zeiten
  description: Lampen nach Start-/Endzeit im Auto-Modus steuern.
  trigger:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      minutes: "/1"
  condition:
    - condition: state
      entity_id: input_select.terrarium_lampen_modus
      state: Auto
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ now() >= today_at(states('input_datetime.terrarium_lampen_start'))
                   and now() < today_at(states('input_datetime.terrarium_lampen_ende')) }}
          sequence:
            - action: switch.turn_on
              target:
                device_id: a41c61defbb6da53874646bd2677c75d
            - choose:
                - conditions:
                    - condition: template
                      value_template: >
                        {% set hinten = device_entities('24cc22083ab3a8b64494ad3f1dd7e3b9') | select('match', '^switch\\.') | list %}
                        {{ hinten | count > 0 and is_state(hinten[0], 'off') }}
                  sequence:
                    - delay: "00:03:00"
            - action: switch.turn_on
              target:
                device_id: 24cc22083ab3a8b64494ad3f1dd7e3b9
      default:
        - action: switch.turn_off
          target:
            device_id:
              - a41c61defbb6da53874646bd2677c75d
              - 24cc22083ab3a8b64494ad3f1dd7e3b9
  mode: single

