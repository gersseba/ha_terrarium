- alias: "Terrarium Geraete Fehler Pruefung"
  id: terrarium_geraete_fehler_pruefung
  trigger:
    - platform: time_pattern
      minutes: "/10"
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: binary_sensor.terrarium_lampen_vorne_geraete_fehler
          state: "on"
        - condition: state
          entity_id: binary_sensor.terrarium_lampen_hinten_geraete_fehler
          state: "on"
        - condition: state
          entity_id: binary_sensor.terrarium_heizung_geraete_fehler
          state: "on"
  action:
    - action: persistent_notification.create
      data:
        title: "⚠️ Terrarium Gerät defekt?"
        message: >
          Folgende Steckdosen sind eingeschaltet aber verbrauchen keinen Strom:
          {% if is_state('binary_sensor.terrarium_lampen_vorne_geraete_fehler', 'on') %}
          - Lampen Vorne
          {% endif %}
