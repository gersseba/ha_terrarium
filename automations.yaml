- id: terrarium_heizung_auto_regelung
  alias: Terrarium Heizung Auto Regelung
  description: Heizung im Auto-Modus mit Hysterese um Zieltemperatur steuern.
  trigger:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      minutes: "/1"
  condition:
    - condition: state
      entity_id: input_select.terrarium_heizung_modus
      state: Auto
  action:
    - variables:
        current_temp: "{{ states('sensor.terrarium_temperatur_durchschnitt') | float(0) }}"
        target_temp: "{{ states('sensor.terrarium_zieltemperatur_aktuell') | float(0) }}"
        hysteresis: "{{ states('input_number.terrarium_heizung_hysterese') | float(0.5) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ current_temp <= (target_temp - hysteresis) }}"
          sequence:
            - action: switch.turn_on
              target:
                device_id: 7f7f621198bb172387384b3554263c74
        - conditions:
            - condition: template
              value_template: "{{ current_temp >= (target_temp + hysteresis) }}"
          sequence:
            - action: switch.turn_off
              target:
                device_id: 7f7f621198bb172387384b3554263c74
  mode: single

