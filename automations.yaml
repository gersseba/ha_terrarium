- id: terrarium_heizung_modus_override
  alias: Terrarium Heizung Modus An Aus
  description: Heizung sofort auf An oder Aus setzen, wenn Modus gewechselt wird.
  trigger:
    - platform: homeassistant
      event: start
    - platform: state
      entity_id: input_select.terrarium_heizung_modus
  condition:
    - condition: template
      value_template: "{{ states('input_select.terrarium_heizung_modus') in ['An', 'Aus'] }}"
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.terrarium_heizung_modus
              state: An
          sequence:
            - action: switch.turn_on
              target:
                device_id: 7f7f621198bb172387384b3554263c74
      default:
        - action: switch.turn_off
          target:
            device_id: 7f7f621198bb172387384b3554263c74
  mode: single

