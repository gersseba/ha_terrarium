
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  dashboards:
    kroeten-dashboard:
      mode: yaml
      title: Kroeten
      icon: mdi:turtle
      show_in_sidebar: true
      filename: lovelace/views/kroeten.yaml
    steuerung-dashboard:
      mode: yaml
      title: Steuerung
      icon: mdi:tune-variant
      show_in_sidebar: true
      filename: lovelace/views/steuerung.yaml
    meta-dashboard:
      mode: yaml
      title: Meta
      icon: mdi:chart-box-outline
      show_in_sidebar: true
      filename: lovelace/views/meta.yaml

template:
  - sensor:
      - name: Gesamtleistung Terrarium und Fruehbeete
        unique_id: gesamtleistung_terrarium_fruehbeete
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ (
            states('sensor.terrarium_lampen_vorne_leistung') | float(0) +
            states('sensor.terrarium_lampen_hinten_leistung') | float(0) +
            states('sensor.terrarium_led_leistung') | float(0) +
            states('sensor.terrarium_heizung_leistung') | float(0) +
            states('sensor.steckdose_krumel_links_leistung') | float(0) +
            states('sensor.steckdose_krumel_rechts_leistung') | float(0) +
            states('sensor.sternies_steckdose_links_leistung') | float(0) +
            states('sensor.steckdose_sternies_rechts_leistung') | float(0)
          ) | round(2) }}

      - name: Strompreis Aktuell Pro Wh
        unique_id: strompreis_aktuell_pro_wh
        unit_of_measurement: "EUR/Wh"
        state: "{{ states('input_number.strompreis_pro_wh') | float(0) | round(5) }}"

      - name: Stromkosten Letzte Woche
        unique_id: stromkosten_letzte_woche
        unit_of_measurement: "EUR"
        state: >
          {{ (
            states('sensor.gesamtenergie_letzte_woche') | float(0) *
            states('input_number.strompreis_pro_wh') | float(0)
          ) | round(2) }}

      - name: Stromkosten Letzter Monat
        unique_id: stromkosten_letzter_monat
        unit_of_measurement: "EUR"
        state: >
          {{ (
            states('sensor.gesamtenergie_letzter_monat') | float(0) *
            states('input_number.strompreis_pro_wh') | float(0)
          ) | round(2) }}

      - name: Stromkosten Jahr Bis Heute
        unique_id: stromkosten_jahr_bis_heute
        unit_of_measurement: "EUR"
        state: >
          {{ (
            states('sensor.gesamtenergie_jahr_bis_heute') | float(0) *
            states('input_number.strompreis_pro_wh') | float(0)
          ) | round(2) }}

sensor:
  - platform: integration
    source: sensor.gesamtleistung_terrarium_und_fruehbeete
    name: Gesamtenergie Gesamt
    unit_time: h
    method: trapezoidal
    round: 3

utility_meter:
  gesamtenergie_letzte_woche:
    source: sensor.gesamtenergie_gesamt
    cycle: weekly
  gesamtenergie_letzter_monat:
    source: sensor.gesamtenergie_gesamt
    cycle: monthly
  gesamtenergie_jahr_bis_heute:
    source: sensor.gesamtenergie_gesamt
    cycle: yearly

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
input_select: !include helpers/input_select.yaml
input_datetime: !include helpers/input_datetime.yaml
input_number: !include helpers/input_number.yaml
