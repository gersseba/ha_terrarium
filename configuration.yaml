
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

lovelace:
  dashboards:
    kroeten-dashboard:
      mode: yaml
      title: Kröten
      icon: mdi:turtle
      show_in_sidebar: true
      filename: lovelace/views/kroeten.yaml
    steuerung-dashboard:
      mode: yaml
      title: Steuerung
      icon: mdi:tune-variant
      show_in_sidebar: true
      filename: lovelace/views/steuerung.yaml
    meta-dashboard:
      mode: yaml
      title: Strom
      icon: mdi:chart-box-outline
      show_in_sidebar: true
      filename: lovelace/views/strom.yaml
    geraete-dashboard:
      mode: yaml
      title: Geräte
      icon: mdi:battery
      show_in_sidebar: true
      filename: lovelace/views/geraete.yaml

template: !include helpers/template.yaml
sensor: !include helpers/sensor.yaml
utility_meter: !include helpers/utility_meter.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
input_select: !include helpers/input_select.yaml
input_datetime: !include helpers/input_datetime.yaml
input_number: !include helpers/input_number.yaml
