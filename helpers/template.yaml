- binary_sensor:
    - name: Terrarium Beleuchtung Aktiv
      unique_id: terrarium_beleuchtung_aktiv
      state: >
        {% set vorne = device_entities('a41c61defbb6da53874646bd2677c75d') | select('match', '^switch\\.') | list %}
        {% set hinten = device_entities('24cc22083ab3a8b64494ad3f1dd7e3b9') | select('match', '^switch\\.') | list %}
        {{
          (vorne | count > 0 and is_state(vorne[0], 'on')) or
          (hinten | count > 0 and is_state(hinten[0], 'on'))
        }}

    - name: Terrarium Lampen Aktiv
      unique_id: terrarium_lampen_aktiv
      state: >
        {% set vorne = device_entities('a41c61defbb6da53874646bd2677c75d') | select('match', '^switch\\.') | list %}
        {% set hinten = device_entities('24cc22083ab3a8b64494ad3f1dd7e3b9') | select('match', '^switch\\.') | list %}
        {{
          (vorne | count > 0 and is_state(vorne[0], 'on')) or
          (hinten | count > 0 and is_state(hinten[0], 'on'))
        }}

    - name: Terrarium Heizung Aktiv
      unique_id: terrarium_heizung_aktiv
      state: >
        {% set heizung = device_entities('7f7f621198bb172387384b3554263c74') | select('match', '^switch\\.') | list %}
        {{ heizung | count > 0 and is_state(heizung[0], 'on') }}

    - name: Fruehbeet Kruemel Beleuchtung Aktiv
      unique_id: fruehbeet_kruemel_beleuchtung_aktiv
      state: >
        {% set left = device_entities('88dde9fbd2e4b8ef4b0ea7bfd470ff55') | select('match', '^switch\\.') | list %}
        {% set right = device_entities('3ea6cd86c82538fda1eed9c8fd683479') | select('match', '^switch\\.') | list %}
        {{
          (is_state('input_select.fruehbeet_kruemel_steckdose_links_rolle', 'Lampen') and left | count > 0 and is_state(left[0], 'on')) or
          (is_state('input_select.fruehbeet_kruemel_steckdose_rechts_rolle', 'Lampen') and right | count > 0 and is_state(right[0], 'on'))
        }}

    - name: Fruehbeet Kruemel Lampen Aktiv
      unique_id: fruehbeet_kruemel_lampen_aktiv
      state: >
        {% set left = device_entities('88dde9fbd2e4b8ef4b0ea7bfd470ff55') | select('match', '^switch\\.') | list %}
        {% set right = device_entities('3ea6cd86c82538fda1eed9c8fd683479') | select('match', '^switch\\.') | list %}
        {{
          (is_state('input_select.fruehbeet_kruemel_steckdose_links_rolle', 'Lampen') and left | count > 0 and is_state(left[0], 'on')) or
          (is_state('input_select.fruehbeet_kruemel_steckdose_rechts_rolle', 'Lampen') and right | count > 0 and is_state(right[0], 'on'))
        }}

    - name: Fruehbeet Kruemel Heizung Aktiv
      unique_id: fruehbeet_kruemel_heizung_aktiv
      state: >
        {% set left = device_entities('88dde9fbd2e4b8ef4b0ea7bfd470ff55') | select('match', '^switch\\.') | list %}
        {% set right = device_entities('3ea6cd86c82538fda1eed9c8fd683479') | select('match', '^switch\\.') | list %}
