- sensor:
    - name: Gesamtleistung Terrarium und Fruehbeete
      unique_id: gesamtleistung_terrarium_fruehbeete
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {{ (
          states('sensor.terrarium_lampen_vorne_leistung') | float(0) +
          states('sensor.terrarium_lampen_hinten_leistung') | float(0) +
          states('sensor.terrarium_led_leistung') | float(0) +
          states('sensor.terrarium_heizung_leistung') | float(0) +
          states('sensor.steckdose_krumel_links_leistung') | float(0) +
          states('sensor.steckdose_krumel_rechts_leistung') | float(0) +
          states('sensor.sternies_steckdose_links_leistung') | float(0) +
          states('sensor.steckdose_sternies_rechts_leistung') | float(0)
        ) | round(2) }}

    - name: Strompreis Aktuell Pro Wh
      unique_id: strompreis_aktuell_pro_wh
      unit_of_measurement: "EUR/Wh"
      state: "{{ states('input_number.strompreis_pro_wh') | float(0) | round(5) }}"

    - name: Stromkosten Letzte Woche
      unique_id: stromkosten_letzte_woche
      unit_of_measurement: "EUR"
      state: >
        {{ (
          states('sensor.gesamtenergie_letzte_woche') | float(0) *
          states('input_number.strompreis_pro_wh') | float(0)
        ) | round(2) }}

    - name: Stromkosten Letzter Monat
      unique_id: stromkosten_letzter_monat
      unit_of_measurement: "EUR"
      state: >
        {{ (
          states('sensor.gesamtenergie_letzter_monat') | float(0) *
          states('input_number.strompreis_pro_wh') | float(0)
        ) | round(2) }}

    - name: Stromkosten Jahr Bis Heute
      unique_id: stromkosten_jahr_bis_heute
      unit_of_measurement: "EUR"
      state: >
        {{ (
          states('sensor.gesamtenergie_jahr_bis_heute') | float(0) *
          states('input_number.strompreis_pro_wh') | float(0)
        ) | round(2) }}

